name: Android CI

# ─── 触发条件 ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main", "develop" ]
    tags:     [ "v*" ]           # v1.0.0 / v1.2.3-beta 等格式触发 Release
  pull_request:
    branches: [ "main" ]

# ─── 权限（用于创建 Release 和上传 Assets）────────────────────────────────────
permissions:
  contents: write

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: 每次 push/PR 都构建 Debug APK，验证代码可以编译通过
  # ══════════════════════════════════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: 仅在 v* tag 时构建 Release APK、签名、创建 GitHub Release
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 从 GitHub Secrets 还原签名 Keystore ─────────────────────────────
      # 需要在仓库 Settings → Secrets 中配置以下 4 个 Secret：
      #   KEYSTORE_BASE64     — keystore 文件的 base64 编码内容
      #   KEYSTORE_PASSWORD   — keystore 密码
      #   KEY_ALIAS           — key alias 名称
      #   KEY_PASSWORD        — key 密码
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.jks

      # ── 构建 Release APK（不混淆，与 build.gradle 保持一致）──────────────
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ── 重命名 APK，附带版本号 ─────────────────────────────────────────
      - name: Rename APK
        run: |
          TAG="${{ github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Gsyn-Java-${TAG}.apk

      # ── 创建 GitHub Release 并上传签名 APK ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Gsyn Java ${{ github.ref_name }}"
          body: |
            ## Gsyn Java ${{ github.ref_name }}

            ### 更新内容
            <!-- 在此处描述本版本的更新内容 -->
            - 请查看 [完整 Commit 记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})

            ### 安装说明
            1. 下载下方的 `Gsyn-Java-${{ github.ref_name }}.apk`
            2. 在 Android 设备上开启「允许未知来源应用」
            3. 安装 APK

            ### 系统要求
            - Android 7.0 (API 24) 及以上
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-beta 自动标为预发布
          files: |
            app/build/outputs/apk/release/Gsyn-Java-${{ github.ref_name }}.apk

