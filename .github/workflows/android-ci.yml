name: Android CI

# ─── 触发条件 ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main", "develop" ]
    tags:     [ "v*" ]           # v1.0.0 / v1.2.3-beta 等格式触发 Release
  pull_request:
    branches: [ "main" ]

# ─── 权限（用于创建 Release 和上传 Assets）────────────────────────────────────
permissions:
  contents: write

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: 每次 push/PR 都构建 Debug APK，验证代码可以编译通过
  # ══════════════════════════════════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: 仅在 v* tag 时构建 Release APK、签名、创建 GitHub Release
  # 
  # 首次使用前必须配置 GitHub Secrets (Settings → Secrets → Actions):
  #   1. KEYSTORE_BASE64     - JKS 格式 keystore 的 Base64 编码
  #   2. KEYSTORE_PASSWORD   - Keystore 密码
  #   3. KEY_ALIAS           - 密钥别名
  #   4. KEY_PASSWORD        - 密钥密码
  # 
  # ⚠️ 常见错误及解决方法：
  #   - "Tag number over 30 is not supported" 
  #     → Keystore 必须是 JKS 格式，不能是 PKCS12
  #     → 生成命令: keytool -genkeypair -storetype JKS -alias gsyn-release \
  #                  -keyalg RSA -keysize 2048 -validity 10000 -keystore release.jks
  #   - "Keystore was tampered with, or password was incorrect"
  #     → 检查 KEYSTORE_PASSWORD 和 KEY_PASSWORD 是否正确
  #   - "Could not find key with alias"
  #     → 检查 KEY_ALIAS 是否与 keystore 中的别名匹配
  # 
  # 详细文档: 参见 RELEASE.md
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 检查必要的 Secrets 是否已配置 ──────────────────────────────────
      - name: Check Required Secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]   && MISSING="$MISSING KEYSTORE_BASE64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}" ]         && MISSING="$MISSING KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}" ]      && MISSING="$MISSING KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "❌ 以下 GitHub Secrets 未配置：$MISSING"
            echo "请前往仓库 Settings → Secrets and variables → Actions 添加这些 Secrets。"
            echo "详细步骤请参考 RELEASE.md。"
            exit 1
          fi
          echo "✅ 所有必要的 Secrets 已配置"

      # ── 从 GitHub Secrets 还原签名 Keystore ─────────────────────────────
      # 需要在仓库 Settings → Secrets 中配置以下 4 个 Secret：
      #   KEYSTORE_BASE64     — keystore 文件的 base64 编码内容（JKS 或 PKCS12 格式）
      #   KEYSTORE_PASSWORD   — keystore 密码
      #   KEY_ALIAS           — key alias 名称
      #   KEY_PASSWORD        — key 密码
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.jks

      # ── 验证 Keystore 可读性及别名 ───────────────────────────────────────
      - name: Validate Keystore
        run: |
          echo "检查 Keystore..."
          KEYTOOL_OUT=$(keytool -J-Duser.language=en -list -v \
            -keystore ${{ runner.temp }}/release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1)
          KEYTOOL_EXIT=$?

          if [ $KEYTOOL_EXIT -ne 0 ]; then
            echo "❌ 无法读取 Keystore，keytool 输出："
            echo "$KEYTOOL_OUT"
            echo ""
            echo "可能的原因："
            echo "  1. KEYSTORE_PASSWORD 不正确"
            echo "  2. KEYSTORE_BASE64 内容损坏（不是有效的 keystore 文件）"
            echo "请检查 GitHub Secrets 中的 KEYSTORE_BASE64 和 KEYSTORE_PASSWORD。"
            exit 1
          fi

          KEYSTORE_TYPE=$(echo "$KEYTOOL_OUT" | grep "Keystore type:" | awk '{print $3}')
          echo "Keystore 类型: $KEYSTORE_TYPE"

          # 接受 JKS 和 PKCS12 格式（现代 AGP 均支持）
          if [ "$KEYSTORE_TYPE" != "JKS" ] && [ "$KEYSTORE_TYPE" != "PKCS12" ]; then
            echo "❌ 未知的 Keystore 类型: $KEYSTORE_TYPE"
            exit 1
          fi
          echo "✅ Keystore 格式验证通过 ($KEYSTORE_TYPE)"

          # 验证别名是否存在
          if ! keytool -J-Duser.language=en -list \
              -keystore ${{ runner.temp }}/release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -alias "${{ secrets.KEY_ALIAS }}" > /dev/null 2>&1; then
            echo "❌ 错误: 在 keystore 中找不到别名 '${{ secrets.KEY_ALIAS }}'"
            echo "可用的别名列表："
            keytool -J-Duser.language=en -list \
              -keystore ${{ runner.temp }}/release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              | grep "PrivateKeyEntry\|SecretKeyEntry\|TrustedCertEntry" || true
            exit 1
          fi
          echo "✅ 别名 '${{ secrets.KEY_ALIAS }}' 验证通过"

      # ── 构建 Release APK（不混淆，与 build.gradle 保持一致）──────────────
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ── 重命名 APK，附带版本号 ─────────────────────────────────────────
      - name: Rename APK
        run: |
          TAG="${{ github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Gsyn-Java-${TAG}.apk

      # ── 创建 GitHub Release 并上传签名 APK ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Gsyn Java ${{ github.ref_name }}"
          body: |
            ## Gsyn Java ${{ github.ref_name }}

            ### 更新内容
            <!-- 在此处描述本版本的更新内容 -->
            - 请查看 [完整 Commit 记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})

            ### 安装说明
            1. 下载下方的 `Gsyn-Java-${{ github.ref_name }}.apk`
            2. 在 Android 设备上开启「允许未知来源应用」
            3. 安装 APK

            ### 系统要求
            - Android 7.0 (API 24) 及以上
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-beta 自动标为预发布
          files: |
            app/build/outputs/apk/release/Gsyn-Java-${{ github.ref_name }}.apk

